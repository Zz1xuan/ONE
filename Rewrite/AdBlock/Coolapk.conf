# > Coolapk / 酷安
# 说明：
# 1. 移除 /v6/main/init 的改写，避免误伤启动配置
# 2. 保留首页/列表/评论/商品/热搜净化
# 3. 新增启动阶段第三方广告 SDK 拦截，用于缩短等待时间

# ===== 启动加速 / 第三方广告 SDK =====
# 阿里广告 / Tanx
^https?:\/\/et\.tanx\.com\/api\/updateZdata\/v4 url reject-200
^https?:\/\/et\.tanx\.com\/v2\/getcvalue url reject-200
^https?:\/\/et\.tanx\.com\/tsbpm url reject-200
^https?:\/\/sdk-config\.tanx\.com\/requestConfigV2 url reject-200
^https?:\/\/adashxgc\.ut\.taobao\.com\/rest\/gc2 url reject-200

# 淘宝/阿里联盟能力
^https?:\/\/baichuan-sdk\.alicdn\.com\/.*\/ios\/rule\.htm url reject-200
^https?:\/\/userlink\.alicdn\.com\/smart_link\/ios\/alsl_switch_config\.json url reject-200

# 京东 Kepler
^https?:\/\/dg\.k\.jd\.com\/getConfigNew url reject-200
^https?:\/\/dg\.k\.jd\.com\/ksdk\/updlist\.json url reject-200
^https?:\/\/dg\.k\.jd\.com\/ksdk\/mid-page\.html url reject-200
^https?:\/\/dgstatic\.jd\.com\/dg\/ksdk\/mid-page\.html url reject-200

# ===== 首页/内容流净化 =====
# 酷安_首页广告
^https?:\/\/api\.coolapk\.com\/v6\/main\/indexV8 url jsonjq-response-body '.data |= map(select(.entityTemplate != "sponsorCard" and .entityTemplate != "iconButtonGridCard" and .entityTemplate != "iconLargeScrollCard" and .entityTemplate != "imageCarouselCard_1" and .entityTemplate != "iconMiniScrollCard" and ((.title // "") | test("值得买|红包") | not)))'

# 酷安_推广广告
^https?:\/\/api\.coolapk\.com\/v6\/dataList url jsonjq-response-body '.data |= map(select(.entityTemplate != "sponsorCard" and .entityTemplate != "iconButtonGridCard" and .entityTemplate != "iconLargeScrollCard" and .entityTemplate != "imageCarouselCard_1" and ((.title // "") | test("流量|精选配件") | not)))'

# 酷安_评论广告
^https?:\/\/api\.coolapk\.com\/v6\/feed\/replyList url jsonjq-response-body '.data |= map(select(.id))'

# 酷安_商品推广
^https?:\/\/api\.coolapk\.com\/v6\/feed\/detail url jsonjq-response-body '.data.hotReplyRows = (.data.hotReplyRows // [] | map(select(.id))) | .data.topReplyRows = (.data.topReplyRows // [] | map(select(.id))) | .data.include_goods_ids = [] | .data.include_goods = [] | .data.detailSponsorCard = []'

# 酷安_数码页轮播
^https:\/\/api\.coolapk\.com\/v6\/page\/dataList\?page url jsonjq-response-body '.data |= map(select(.entityTemplate != "imageCarouselCard_1"))'

# 酷安_屏蔽热词
^https?:\/\/api\.coolapk\.com\/v6\/search\?.*type=hotSearch url reject-200

hostname = api.coolapk.com, et.tanx.com, sdk-config.tanx.com, adashxgc.ut.taobao.com, baichuan-sdk.alicdn.com, userlink.alicdn.com, dg.k.jd.com, dgstatic.jd.com
