[rewrite_local]
# 开屏及预加载广告：请求命中后由 QX 本地立即返回 {}，不等待远端响应。
# 必须放在其他广告响应脚本之前。
^https:\/\/maicai\.api\.ddxq\.mobi\/advert\/(?:startUpScreen|getPreloadAd)(?:\?|$) url reject-dict

# 其余广告接口和首页营销弹窗采用响应体精细清理。
^https:\/\/maicai\.api\.ddxq\.mobi\/(?:advert\/(?:getAd|getAtmosphere)|homeApi\/getHomeAdPop)(?:\?|$) url script-response-body https://raw.githubusercontent.com/Zz1xuan/ONE/refs/heads/main/Rewrite/AdBlock/DingDong/ddxq_ad.js

[mitm]
hostname = maicai.api.ddxq.mobi
