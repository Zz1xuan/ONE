# 番茄小说 / 字节系去广告（基于 HAR + 域名补充）
#
# 已启用：
# - ads5-normal-lf.zijieapi.com: TNC 配置里直接出现的广告域
# - ad.zijieapi.com: TNC 配置里直接出现的广告域
# - log5-applog.fqnovel.com: 番茄小说日志上报域，通常可安全屏蔽
#
# 未直接启用：
# 下面注释掉的域名里，很多在 HAR/TNC 中更像网络调度、风控、安全、静态资源或主业务接口。
# 为了最小破坏，先不默认拦截；如果你后续确认某条就是广告链路，再逐条放开测试。

# 明确广告 / 上报
host, ads5-normal-lf.zijieapi.com, reject
host, ad.zijieapi.com, reject
host, log5-applog.fqnovel.com, reject

# 高风险候选，默认不要开

# 内容 / 搜索 / 业务接口，误杀后容易影响正文、搜索、拉流或页面数据
host, i.snssdk.com, reject
host, is.snssdk.com, reject
host, vcs.zijieapi.com, reject
host, api5-normal.fqnovel.com, reject

# 风控 / 安全 / 设备 SDK，误杀后容易出现校验失败、白屏或异常弹窗
host, security.snssdk.com, reject
host, mssdk3-normal-lf.zijieapi.com, reject

# TNC / HTTPDNS / 动态域名调度，HAR 中 tnc0-aliec2.zijieapi.com 明确返回网络调度配置
host, tnc3-alisc1.snssdk.com, reject
host, tnc3-bjlgy.snssdk.com, reject
host, dig.bdurl.net, reject
host, tnc0-aliec1.zijieapi.com, reject
host, tnc0-aliec2.zijieapi.com, reject

# 静态资源 / CDN，HAR 同类 bytegecko 域名命中过 PNG 资源，误杀会丢图或丢活动入口
host, lf-sourcecdn-tos.bytegecko.com, reject

# 实验 / AB / 配置分流，可能影响广告开关，但也可能影响正常功能开关
host, abtest3-misc.zijieapi.com, reject
