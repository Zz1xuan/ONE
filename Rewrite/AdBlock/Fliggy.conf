# 飞猪开屏
hostname = acs.m.taobao.com, dorangesource.alicdn.com, market.m.taobao.com, amdc.m.taobao.com

ip-cidr, 59.82.34.255/32, reject
ip-cidr, 59.82.34.147/32, reject
ip-cidr, 59.82.9.145/32, reject
ip-cidr, 59.82.113.219/32, reject
ip-cidr, 59.82.113.10/32, reject
ip-cidr, 47.246.103.10/32, reject
ip-cidr, 47.246.103.9/32, reject

^http:\/\/amdc\.m\.taobao\.com url script-response-body https://raw.githubusercontent.com/Zz1xuan/ONE/main/Script/AD/self_use_qx.js

# 先去掉 zstd，避免开屏接口响应体无法被 jq 正常处理
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.fliggy\.crm\.screen\.(availablesplashstrategies|emergencyshutdown)\/1\.0(?:\?.*)?$ url script-request-header https://raw.githubusercontent.com/Zz1xuan/ONE/main/Script/AD/fliggy_strip_zstd.js

# 开屏主接口，直接清空 seat
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.fliggy\.crm\.screen\.availablesplashstrategies\/1\.0(?:\?.*)?$ url jsonjq-response-body 'if .api == "mtop.fliggy.crm.screen.availablesplashstrategies" then (.data.data.seat = [] | .data.ctx.strategyMessages = []) else . end'

# 开屏熔断
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.fliggy\.crm\.screen\.emergencyshutdown\/1\.0(?:\?.*)?$ url jsonjq-response-body 'if .api == "mtop.fliggy.crm.screen.emergencyshutdown" then (.data.data.needShutDown = true | .data.success = true) else . end'

# 老的开屏资源接口
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.fliggy\.crm\.screen\.allresource(?:\?.*)?$ url reject-200

# 3AD SDK 配置
^https:\/\/dorangesource\.alicdn\.com\/ns531d19b179f049979203776c80012c6c\.json(?:\?.*)?$ url jsonjq-response-body 'if .name == "fliggy_3ad_sdk" and .content then (.content."InterstitialAd.load_after_start_enable" = "false" | .content."RewardedAd.load_after_start_enable" = "false" | .content."SplashAd.load_after_start_enable" = "false" | .content."SplashAd.placement_id" = "" | .content."SplashAd.BETA.placement_id" = "" | .content."SplashAd.DEBUG.placement_id" = "" | .content."taku_ad_info_report_enable" = "false" | .content."taku_ad_log_report_enable" = "false") else . end'

# 广告路由配置
^https:\/\/dorangesource\.alicdn\.com\/ns203192e076034180b9ac01232aafc6d2\.json(?:\?.*)?$ url jsonjq-response-body 'if .name == "fliggy_ad_config" and .content then .content.fliggy_ad_router_update_jump_url_switch = "0" else . end'

# 弹层页链路
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.trip\.serverless\.api\.gateway\/2\.0(?:\?.*)?$ url jsonjq-response-body 'if .data.result.model.data.pages then (.data.result.model.data.pages |= map(select((.url // "") | contains("h5-crm-poplayer") | not))) else . end'

^https:\/\/market\.m\.taobao\.com\/app\/trip\/h5-crm-poplayer\/pages\/(home|fliggy)\/index\.html(?:\.fmanifest\.html)?(?:\?.*)?$ url reject-200

# 首页节日营销模块
^https:\/\/acs\.m\.taobao\.com\/gw\/mtop\.trip\.train\.homepage\/1\.0(?:\?.*)?$ url jsonjq-response-body 'if .data.holidayMarketingModule then del(.data.holidayMarketingModule) else . end'
