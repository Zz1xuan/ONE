hostname = www.foooooot.com, adapi.foooooot.com, api-access.pangolin-sdk-toutiao.com, api-access.pangolin-sdk-toutiao1.com, log-api.pangolin-sdk-toutiao-b.com, gromore.pangolin-sdk-toutiao.com, sf3-fe-tos.pglstatp-toutiao.com, sdk.e.qq.com, mi.gdt.qq.com, qzs.gdtimg.com, pgdt.ugdtimg.com

# 六只脚去广告规则（基于 HAR 抓包分析）

# 六只脚自家广告域名
host, adapi.foooooot.com, reject

# 穿山甲 / GroMore
host, api-access.pangolin-sdk-toutiao.com, reject
host, api-access.pangolin-sdk-toutiao1.com, reject
host, log-api.pangolin-sdk-toutiao-b.com, reject
host, gromore.pangolin-sdk-toutiao.com, reject
host, sf3-fe-tos.pglstatp-toutiao.com, reject

# 广点通 / 腾讯广告
host, sdk.e.qq.com, reject
host, mi.gdt.qq.com, reject
host, qzs.gdtimg.com, reject
host, pgdt.ugdtimg.com, reject

# 清空广告位配置，保留其余配置字段
^https:\/\/www\.foooooot\.com\/v4\/api\/config\/all$ url jsonjq-response-body 'if .data.ads? then .data.ads.mainFlowPositions=[] | .data.ads.searchFlowPositions=[] | .data.ads.interstitialInterval=0 | .data.ads.hotShowInterval=0 | .data.ads.splashId="" | .data.ads.interstitialId="" | .data.ads.flowId="" else . end'

# 拦截开屏资源与弹窗广告接口
^https:\/\/www\.foooooot\.com\/client2\/start_page_resource\/$ url reject-dict
^https:\/\/www\.foooooot\.com\/api\/v3\/popad\/$ url reject-dict

# 关闭登录态返回中的广告开关
^https:\/\/www\.foooooot\.com\/client2\/is_login\/$ url jsonjq-response-body 'if .config? then .config.POPAD_FREQ=1000000000 else . end | if .dsp? then .dsp.admobile2=false | .dsp.admobile=false else . end'

# 移除首页顶部轮播和广告卡片，保留正常文章与行程内容
^https:\/\/www\.foooooot\.com\/api\/v3\/feed\/home_new\/\?.* url jsonjq-response-body 'if (.data|type) == "array" then .data |= map(select(((((.tmpl_type // -1) == 1) and ((.data_type // -1) == 9)) or (((.tmpl_type // -1) == 2) and ((.data_type // -1) == 5) and ((((.target_data // [])[0].data_type) // -1) == 19))) | not)) else . end'
