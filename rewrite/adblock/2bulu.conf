# 两步路户外助手去广告 + 清爽精修版
# 目标：去掉启动页广告、会员推广、商城、首页推荐卡片、关注/搭子/同城广场等内容
# 策略：只拦“展示内容接口”，尽量不拦主功能页和动作接口，减少副作用

[rewrite_local]
# 一、启动页 / 弹窗 / 广告位
^https?:\/\/helper\.2bulu\.com\/getPopInfo\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/getSplash\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/saveSplashFrequencyStatistics.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/v9\/advert\/getUniversalAd\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/advert\/getAllAdInfo\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/getAppEntranceConfig\?.*$ url reject-dict

# 二、会员推广 / 商城 / 运营入口
^https?:\/\/helper\.2bulu\.com\/promote\/list\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/promote\/getAppUserModule\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/proSpecial\/allData\?.*$ url reject-dict

# 三、首页/发现推荐流
^https?:\/\/helper\.2bulu\.com\/v9\/home\/feed\?.*$ url reject-dict
^https?:\/\/helper\.2bulu\.com\/v9\/routeChannel\/topic\?.*$ url reject-dict

# 四、同城 / 搭子 / 广场内容流
^https?:\/\/saas-h5\.2bulu\.com\/helperapi\/v9\/sameCity\/content\?.*$ url reject-dict
^https?:\/\/saas-h5\.2bulu\.com\/helperapi\/v9\/sameCity\/(outing|event)\?.*$ url reject-dict
^https?:\/\/saas-h5\.2bulu\.com\/helperapi\/v9\/sameCity\/qualityCreator\?.*$ url reject-dict

# 五、广告行为上报
^https?:\/\/helper\.2bulu\.com\/adActivity\?.*$ url reject-dict

[filter_local]
# 第三方广告 SDK / 素材 / 统计域名
host-suffix,ssp.admobile.top,reject
host-suffix,admobile.top,reject
host-suffix,pangolin-sdk-toutiao.com,reject
host-suffix,pangolin-sdk-toutiao1.com,reject
host-suffix,pglstatp-toutiao.com,reject
host-suffix,bitonloop.com,reject
host-suffix,prosunnymob.cn,reject

[mitm]
# 只保留 rewrite_local 实际命中的域名
hostname = helper.2bulu.com, saas-h5.2bulu.com
